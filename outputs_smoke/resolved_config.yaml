experiment:
  name: d5a_class_pixel_motif_retrieval_local
paths:
  csv_root: ../data
  artifact_root: artifacts
  graph_repo_path: artifacts/graph_repo_smoke
  output_root: outputs_smoke
data:
  dataset: fer2013
  batch_size: 2
  num_workers: 0
  pin_memory: true
  graph_cache_chunks: 1
graph:
  height: 48
  width: 48
  connectivity: 8
  normalize_pixels: true
  chunk_size: 500
  intensity_similarity_alpha: 1.0
model:
  name: class_pixel_motif_graph_retrieval
  num_classes: 7
  node_dim: 7
  edge_dim: 5
  hidden_dim: 64
  edge_hidden_dim: 64
  gnn_layers: 1
  use_edge_gnn: true
  dropout: 0.2
  temperature: 0.2
  edge_score_weight: 0.5
loss:
  name: d5_retrieval
  use_class_weights: true
  class_counts:
  - 3995
  - 436
  - 4097
  - 7215
  - 4830
  - 3171
  - 4965
  class_weight_power: 0.25
  lambda_cls: 1.0
  lambda_contrast: 0.1
  lambda_smooth: 0.01
  lambda_closure: 0.01
  lambda_area: 0.01
  lambda_div: 0.0
  margin: 0.2
  target_area: 0.15
optimizer:
  name: adamw
  lr: 0.0007
  weight_decay: 0.0001
scheduler:
  name: ReduceLROnPlateau
  mode: max
  monitor: val_macro_f1
  factor: 0.5
  patience: 5
  min_lr: 1.0e-06
training:
  epochs: 1
  seed: 42
  device: auto
  monitor: val_macro_f1
  early_stopping_patience: 20
  grad_clip_norm: 5.0
  max_train_batches: 1
  max_val_batches: 1
  max_test_batches: 1
logging:
  use_wandb: false
  project: FER2013-D5
