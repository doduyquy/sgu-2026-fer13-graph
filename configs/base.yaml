environment: local

paths:
  csv_root: auto
  artifact_root: artifacts
  graph_repo_path: artifacts/graph_repo
  output_root: outputs

environments:
  local:
    paths:
      csv_root: data
      artifact_root: artifacts
      graph_repo_path: artifacts/graph_repo_local
      output_root: outputs_local
  kaggle:
    paths:
      csv_root: auto
      artifact_root: /kaggle/working/artifacts
      graph_repo_path: /kaggle/working/artifacts/graph_repo
      output_root: /kaggle/working/fer_d5_outputs

data:
  dataset: fer2013
  batch_size: 16
  num_workers: 0
  pin_memory: false
  chunk_cache_size: 0
  chunk_aware_shuffle: false

graph:
  height: 48
  width: 48
  connectivity: 8
  normalize_pixels: true
  chunk_size: 500
  intensity_similarity_alpha: 1.0

training:
  epochs: 80
  seed: 42
  device: auto
  monitor: val_macro_f1
  early_stopping_patience: 20
  grad_clip_norm: 5.0
  max_train_batches: null
  max_val_batches: null
  max_test_batches: null

logging:
  use_wandb: false
  project: FER2013-D5
