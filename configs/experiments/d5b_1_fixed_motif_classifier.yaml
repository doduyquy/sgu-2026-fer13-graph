inherits:
  - ../d5a.yaml

experiment:
  name: d5b_1_fixed_motif_classifier

paths:
  graph_repo_path: artifacts/graph_repo
  output_root: output

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      output_root: output

prior:
  output_dir: artifacts/d5b_motif_prior
  node_prior_path: artifacts/d5b_motif_prior/node_prior.pt
  activation_weights:
    intensity: 0.2
    grad_mag: 0.4
    local_contrast: 0.4
  alpha_effect: 0.45
  beta_fisher: 0.30
  gamma_support: 0.20
  delta_commonness: 0.15
  support_percentile: 75
  smooth_kernel: 3
  clamp_min: 0.05
  clamp_max: 0.95

model:
  name: fixed_motif_mlp_classifier
  node_dim: 7
  num_classes: 7
  hidden_dim: 256
  dropout: 0.2
  freeze_prior: true

loss:
  name: cross_entropy
  use_class_weights: true
  class_counts: [3995, 436, 4097, 7215, 4830, 3171, 4965]
  class_weight_power: 0.25

training:
  epochs: 40
  early_stopping_patience: 10
  amp: true

data:
  batch_size: 32
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  chunk_cache_size: 8
  chunk_aware_shuffle: true
