experiment:
  name: d8m_stage2d_v2a_lr3e5_reg003

paths:
  graph_repo_path: artifacts/graph_repo
  resolved_output_root: outputs/d8m_stage2d_v2a_lr3e5_reg003

stage1:
  config: configs/experiments/d8m_motif_discovery_stage1h_k16_teacher_align_lite_decay_long24.yaml
  checkpoint: outputs/d8m_motif_discovery_stage1h_k16_teacher_align_lite_decay_long24/checkpoints/best.pth

stage1_finetune:
  enabled: true
  unfreeze_patterns:
    - motif_queries
    - score_head
  freeze_exclude_patterns:
    - pixel_encoder
    - shared_pixel_encoder
    - graph_swin
    - backbone
  lr_stage1: 3.0e-5
  weight_decay_stage1: 1.0e-5

stage1_regularization:
  enabled: true
  lambda_stage1_reg: 0.03

stage2:
  num_selected_motifs: 6
  selection_source: selection_weights
  graph_type: fully_connected
  self_loops: false
  use_spatial_features: true
  use_area_feature: true
  use_selection_weight_feature: true
  use_region_features: false

model:
  name: motif_semantic_projector
  arch: pooled_mlp
  input_dim: null
  hidden_dim: 256
  projection_dim: 128
  dropout: 0.3
  num_classes: 7
  classifier_input: hidden
  projection_normalize: true
  use_supcon: false

data:
  graph_repo_path: null
  batch_size: 32
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  chunk_cache_size: 8

training:
  device: auto
  seed: 42
  epochs: 10
  lr: 0.001
  weight_decay: 0.0001
  class_weights: false
  weighted_sampler: true
  use_weighted_sampler: true
  grad_clip_norm: 1.0
  amp: true
  val_every: 1
  save_best_metric: val_macro_f1

audit:
  dir: outputs/d8m_stage2d_v2a_lr3e5_reg003/projection_audit

output:
  dir: outputs/d8m_stage2d_v2a_lr3e5_reg003

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      resolved_output_root: outputs/d8m_stage2d_v2a_lr3e5_reg003
