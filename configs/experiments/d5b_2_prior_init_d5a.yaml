inherits:
  - ../d5a.yaml

experiment:
  name: d5b_2_prior_init_d5a

run:
  mode: train
  zip_outputs: true

paths:
  graph_repo_path: artifacts/graph_repo
  output_root: output
  resolved_output_root: output/d5b_2_prior_init_d5a

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      output_root: output
      resolved_output_root: output/d5b_2_prior_init_d5a
  kaggle:
    paths:
      csv_root: auto
      artifact_root: /kaggle/working/artifacts
      graph_repo_path: /kaggle/working/artifacts/graph_repo
      output_root: /kaggle/working/outputs
      resolved_output_root: /kaggle/working/outputs/d5b_2_prior_init_d5a

model:
  name: class_pixel_motif_graph_retrieval
  motif_prior_path: artifacts/d5b_motif_prior/node_prior.pt
  init_node_gate_from_prior: true
  prior_init_clamp_min: 0.05
  prior_init_clamp_max: 0.95
  edge_score_weight: 0.0

loss:
  name: d5_retrieval
  use_class_weights: true
  class_counts: [3995, 436, 4097, 7215, 4830, 3171, 4965]
  class_weight_power: 0.25
  lambda_cls: 1.0
  lambda_contrast: 0.05
  lambda_smooth: 0.0
  lambda_closure: 0.0
  lambda_area: 0.0
  lambda_div: 0.0
  lambda_prior: 0.0
  prior_loss_type: mse

data:
  batch_size: 32
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  chunk_cache_size: 8
  chunk_aware_shuffle: true

training:
  device: auto
  epochs: 40
  monitor: val_macro_f1
  early_stopping_patience: 10
  grad_clip_norm: 5.0
  amp: true
  profile_batches: 0
  max_train_batches: null
  max_val_batches: null
  max_test_batches: null

optimizer:
  name: adamw
  lr: 0.0007
  weight_decay: 0.0001

scheduler:
  name: ReduceLROnPlateau
  mode: max
  monitor: val_macro_f1
  factor: 0.5
  patience: 5
  min_lr: 0.000001
