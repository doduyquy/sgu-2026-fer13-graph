inherits:
  - d7a_graph_swin_standalone.yaml

experiment:
  name: d7a_graph_swin_region_transformer

paths:
  resolved_output_root: output/d7a_graph_swin_region_transformer

environments:
  local:
    paths:
      resolved_output_root: output/d7a_graph_swin_region_transformer
  kaggle:
    paths:
      resolved_output_root: /kaggle/working/outputs/d7a_graph_swin_region_transformer

model:
  graph_swin:
    window_size: 6
    shift_size: 3
    window_heads: 4
    use_window_mha: false
    region_merge: true
    num_region_tokens: 16
    use_region_transformer: true
    region_layers: 1
    region_heads: 4
    class_head_type: attn_only

