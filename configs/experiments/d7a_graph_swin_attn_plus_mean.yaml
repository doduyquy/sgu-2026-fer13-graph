inherits:
  - d7a_graph_swin_standalone.yaml

experiment:
  name: d7a_graph_swin_attn_plus_mean

paths:
  resolved_output_root: output/d7a_graph_swin_attn_plus_mean

environments:
  local:
    paths:
      resolved_output_root: output/d7a_graph_swin_attn_plus_mean
  kaggle:
    paths:
      resolved_output_root: /kaggle/working/outputs/d7a_graph_swin_attn_plus_mean

model:
  graph_swin:
    window_size: 6
    shift_size: 3
    window_heads: 4
    use_window_mha: false
    region_merge: true
    num_region_tokens: 16
    class_head_type: attn_plus_mean

