inherits:
  - d6b_class_part_graph_motif_border075.yaml

experiment:
  name: d8a_graph_swin_prepart_d6b

paths:
  resolved_output_root: output/d8a_graph_swin_prepart_d6b

output:
  dir: output/d8a_graph_swin_prepart_d6b

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      resolved_output_root: output/d8a_graph_swin_prepart_d6b
  kaggle:
    paths:
      csv_root: auto
      artifact_root: /kaggle/working/artifacts
      graph_repo_path: /kaggle/working/artifacts/graph_repo
      output_root: /kaggle/working/outputs
      resolved_output_root: /kaggle/working/outputs/d8a_graph_swin_prepart_d6b

model:
  name: graph_swin_prepart_d6b_d8a
  num_classes: 7
  node_dim: 7
  edge_dim: 5
  hidden_dim: 64
  pixel_gnn_layers: 1
  num_part_slots: 16
  part_layers: 1
  part_heads: 4
  dropout: 0.2
  use_part_position: true
  assignment_temperature: 1.0
  return_attention: true
  pixel_encoder:
    type: edge_aware
    num_layers: 1
    dropout: 0.2
  prepart_context:
    enabled: true
    type: graph_swin_window_context
    image_size: 48
    window_size: 6
    shift_size: 3
    window_heads: 4
    use_window_mha: false
    context_merge: regular_shifted_sum
    context_proj: true
    alpha_init: 0.1
    alpha_learnable: true
    dropout: 0.1
  part_branch:
    num_parts: 16
    null_slot: false
    assignment_softmax: over_parts_per_pixel
    use_part_position: true
    part_self_attention_heads: 4
    class_to_part_attention: true

loss:
  name: d8a_prepart_motif_loss
  use_class_weights: true
  class_counts: [3995, 436, 4097, 7215, 4830, 3171, 4965]
  class_weight_power: 0.25
  lambda_cls: 1.0
  lambda_slot_div: 0.01
  lambda_border: 0.0075
  lambda_slot_balance: 0.01
  lambda_slot_smooth: 0.0
  border_width: 3
  border_loss_type: slot_ratio
  slot_balance_type: kl_uniform
  context_alpha_l2_weight: 0.0

optimizer:
  name: adamw
  lr: 0.0005
  weight_decay: 0.0001

scheduler:
  name: ReduceLROnPlateau
  mode: max
  monitor: val_macro_f1
  factor: 0.5
  patience: 7
  min_lr: 0.000001

training:
  device: auto
  epochs: 120
  monitor: val_macro_f1
  early_stopping_patience: 25
  batch_size: 32
  amp: true
  amp_init_scale: 1024
  grad_clip_norm: 3.0

data:
  batch_size: 32
  node_dim: 7
  edge_dim: 5
