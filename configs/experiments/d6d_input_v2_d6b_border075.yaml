inherits:
  - d6b_class_part_graph_motif_border075.yaml

experiment:
  name: d6d_input_v2_d6b_border075

paths:
  graph_repo_path: artifacts/graph_repo_d6d_input_v2
  resolved_output_root: output/d6d_input_v2_d6b_border075

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo_d6d_input_v2
      resolved_output_root: output/d6d_input_v2_d6b_border075
  kaggle:
    paths:
      graph_repo_path: /kaggle/working/artifacts/graph_repo_d6d_input_v2
      resolved_output_root: /kaggle/working/outputs/d6d_input_v2_d6b_border075

data:
  batch_size: 32
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  chunk_cache_size: 8
  chunk_aware_shuffle: true

graph:
  node_feature_names:
    - intensity
    - x_norm
    - y_norm
    - gx
    - gy
    - grad_mag
    - local_contrast
    - grad_ori_cos
    - grad_ori_sin
    - local_mean_5x5
    - local_std_5x5
    - border_distance
  version: d6d_input_v2_node12

model:
  name: slot_pixel_part_graph_motif_d6b
  node_dim: 12
  edge_dim: 5
  hidden_dim: 64
  pixel_gnn_layers: 1
  num_part_slots: 16
  part_layers: 1
  part_heads: 4
  use_class_part_attention: true

loss:
  name: d6b_class_part_motif
  lambda_slot_div: 0.01
  lambda_border: 0.0075
  lambda_slot_balance: 0.01
  lambda_slot_smooth: 0.0

optimizer:
  name: adamw
  lr: 0.0005
  weight_decay: 0.0001

scheduler:
  name: ReduceLROnPlateau
  mode: max
  monitor: val_macro_f1
  factor: 0.5
  patience: 7
  min_lr: 0.000001

training:
  epochs: 120
  early_stopping_patience: 25
  amp: true
  amp_init_scale: 1024
  grad_clip_norm: 3.0
