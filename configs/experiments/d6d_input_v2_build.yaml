inherits:
  - ../base.yaml

environment: local

paths:
  graph_repo_path: artifacts/graph_repo_d6d_input_v2

environments:
  local:
    paths:
      csv_root: data
      graph_repo_path: artifacts/graph_repo_d6d_input_v2
  kaggle:
    paths:
      csv_root: auto
      graph_repo_path: /kaggle/working/artifacts/graph_repo_d6d_input_v2

graph:
  height: 48
  width: 48
  connectivity: 8
  normalize_pixels: true
  chunk_size: 500
  intensity_similarity_alpha: 1.0
  version: d6d_input_v2_node12
  node_feature_names:
    - intensity
    - x_norm
    - y_norm
    - gx
    - gy
    - grad_mag
    - local_contrast
    - grad_ori_cos
    - grad_ori_sin
    - local_mean_5x5
    - local_std_5x5
    - border_distance
