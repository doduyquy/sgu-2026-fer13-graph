experiment:
  name: d8m_stage2a_motif_graph_frozen_stage1h_lite

paths:
  graph_repo_path: artifacts/graph_repo
  resolved_output_root: outputs/d8m_stage2a_motif_graph_frozen_stage1h_lite

stage1:
  config: configs/experiments/d8m_motif_discovery_stage1h_k16_teacher_align_lite_decay_long24.yaml
  checkpoint: outputs/d8m_motif_discovery_stage1h_k16_teacher_align_lite_decay_long24/checkpoints/best.pth
  freeze: true

stage2:
  num_selected_motifs: 6
  selection_source: selection_weights
  graph_type: fully_connected
  self_loops: false
  use_spatial_features: true
  use_area_feature: true
  use_selection_weight_feature: true
  use_region_features: false

model:
  name: motif_graph_classifier
  input_dim: null
  hidden_dim: 128
  num_layers: 2
  num_heads: 4
  dropout: 0.2
  num_classes: 7
  readout: weighted_mean_max

data:
  graph_repo_path: null
  batch_size: 32
  num_workers: 2
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  chunk_cache_size: 8

training:
  device: auto
  seed: 42
  epochs: 60
  lr: 0.001
  weight_decay: 0.0001
  class_weights: true
  class_counts: [3995, 436, 4097, 7215, 4830, 3171, 4965]
  max_class_weight: 3.0
  grad_clip_norm: 1.0
  amp: true
  early_stopping_patience: 15
  val_every: 1
  save_best_metric: val_macro_f1

output:
  dir: outputs/d8m_stage2a_motif_graph_frozen_stage1h_lite

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      resolved_output_root: outputs/d8m_stage2a_motif_graph_frozen_stage1h_lite
