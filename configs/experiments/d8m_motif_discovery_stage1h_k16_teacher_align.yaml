inherits:
  - d8m_motif_discovery_stage1g_k16_region_clean.yaml

experiment:
  name: d8m_motif_discovery_stage1h_k16_teacher_align

paths:
  resolved_output_root: outputs/d8m_motif_discovery_stage1h_k16_teacher_align

output:
  dir: outputs/d8m_motif_discovery_stage1h_k16_teacher_align

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      resolved_output_root: outputs/d8m_motif_discovery_stage1h_k16_teacher_align

teacher_alignment:
  enabled: true
  teacher_config: configs/experiments/d8b_face_aware_graph_swin_border020.yaml
  teacher_checkpoint: output/d8b_face_aware_graph_swin_border020/checkpoints/best.pth
  saliency_method: input_gradient
  target: ground_truth
  freeze_teacher: true
  teacher_eval_mode: true
  use_face_safe_filter: true
  face_safe_margin: 0.12
  face_safe_tau: 0.04
  center_prior_sigma: 0.45
  center_prior_power: 0.3
  lambda_teacher_align: 0.02
  start_epoch: 6
  ramp_epochs: 5
  confidence_weighted: true
  min_teacher_confidence: 0.0

quality_score:
  teacher_motif_cosine_weight: 0.4
