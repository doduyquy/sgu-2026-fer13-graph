inherits:
  - ../base.yaml

experiment:
  name: d8m_motif_discovery_debug

paths:
  resolved_output_root: outputs/d8m_motif_discovery_debug

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      resolved_output_root: outputs/d8m_motif_discovery_debug
  kaggle:
    paths:
      csv_root: auto
      artifact_root: /kaggle/working/artifacts
      graph_repo_path: /kaggle/input/datasets/irthn1311/graph-repo/graph_repo
      output_root: /kaggle/working/outputs
      resolved_output_root: /kaggle/working/outputs/d8m_motif_discovery_debug

data:
  graph_repo_path: configurable
  batch_size: 4
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  chunk_cache_size: 8
  chunk_aware_shuffle: false

model:
  name: motif_discovery_debug
  node_dim: 7
  edge_dim: 5
  hidden_dim: 64
  num_motifs: 16
  image_size: 48
  num_nodes: 2304
  pixel_gnn_layers: 1
  dropout: 0.1
  use_pixel_encoder_from: d7
  border_width: 4
  map_sim_threshold: 0.80
  emb_sim_threshold: 0.80
  center_distance_threshold: 0.15

motif:
  loss:
    lambda_div_map: 0.02
    lambda_div_emb: 0.01
    lambda_border: 0.02
    lambda_area: 0.02
    lambda_entropy: 0.01
    area_min: 12.0
    area_max: 650.0

training:
  device: auto
  seed: 42
