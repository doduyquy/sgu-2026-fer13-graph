inherits:
  - d7a_graph_swin_region_transformer.yaml

experiment:
  name: d7a_graph_swin_region_transformer_long150_resume

paths:
  resolved_output_root: output/d7a_graph_swin_region_transformer_long150_resume

output:
  dir: output/d7a_graph_swin_region_transformer_long150_resume

environments:
  local:
    paths:
      resolved_output_root: output/d7a_graph_swin_region_transformer_long150_resume
  kaggle:
    paths:
      resolved_output_root: /kaggle/working/outputs/d7a_graph_swin_region_transformer_long150_resume

training:
  epochs: 150
  early_stopping_patience: 30
  monitor: val_macro_f1
  amp: true
  amp_init_scale: 1024
  grad_clip_norm: 3.0

optimizer:
  name: adamw
  lr: 0.0005
  weight_decay: 0.0001

scheduler:
  name: ReduceLROnPlateau
  mode: max
  monitor: val_macro_f1
  factor: 0.5
  patience: 7
  min_lr: 0.000001

resume:
  path: /kaggle/input/datasets/irthn1311/d7a-graph-swin-region-transformer-checkpoint/checkpoints/last.pth
  best_checkpoint_path: /kaggle/input/datasets/irthn1311/d7a-graph-swin-region-transformer-checkpoint/checkpoints/best.pth
  load_optimizer: true
  load_scheduler: true
  load_epoch: true
  strict: true
  best_metric: 0.5769682287211658
  best_epoch: 119
