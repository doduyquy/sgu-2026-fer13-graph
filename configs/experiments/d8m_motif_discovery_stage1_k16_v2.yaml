inherits:
  - ../base.yaml

experiment:
  name: d8m_motif_discovery_stage1_k16_v2

paths:
  resolved_output_root: outputs/d8m_motif_discovery_stage1_k16_v2

output:
  dir: outputs/d8m_motif_discovery_stage1_k16_v2

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      resolved_output_root: outputs/d8m_motif_discovery_stage1_k16_v2
  kaggle:
    paths:
      csv_root: auto
      artifact_root: /kaggle/working/artifacts
      graph_repo_path: /kaggle/input/datasets/irthn1311/graph-repo/graph_repo
      output_root: /kaggle/working/outputs
      resolved_output_root: /kaggle/working/outputs/d8m_motif_discovery_stage1_k16_v2

model:
  name: motif_discovery_debug
  node_dim: 7
  edge_dim: 5
  hidden_dim: 64
  num_motifs: 16
  image_size: 48
  num_nodes: 2304
  pixel_gnn_layers: 1
  dropout: 0.1
  use_pixel_encoder_from: d7
  freeze_pixel_encoder: true
  attention_temperature: 0.5
  use_learnable_logit_scale: false
  init_logit_scale: 1.0
  max_logit_scale: 10.0
  use_spatial_query_bias: true
  spatial_bias_type: gaussian
  spatial_bias_sigma: 0.25
  spatial_bias_strength: 1.0
  spatial_bias_decay: true
  spatial_bias_decay_epochs: 20
  spatial_bias_min_strength: 0.1
  border_width: 4
  map_sim_threshold: 0.80
  emb_sim_threshold: 0.80
  center_distance_threshold: 0.15
  min_effective_area: 40
  max_effective_area: 400
  max_border_mass: 0.45

data:
  graph_repo_path: null
  batch_size: 32
  num_workers: 2
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  chunk_cache_size: 8
  chunk_aware_shuffle: false

training:
  device: auto
  seed: 42
  epochs: 50
  lr_motif: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  log_every: 20
  val_every: 1
  save_every: 10
  amp: true

motif_loss:
  lambda_div_map: 0.08
  lambda_div_emb: 0.03
  lambda_coverage: 0.03
  lambda_border: 0.02
  lambda_entropy: 0.15
  lambda_area: 0.05
  min_effective_area: 40
  max_effective_area: 400
  border_width: 4

schedule:
  enabled: true
  warmup_epochs: 5
  diversity_ramp_epochs: 10
  coverage_start_epoch: 3
  coverage_ramp_epochs: 7

audit:
  redundant_map_threshold: 0.80
  redundant_emb_threshold: 0.80
  redundant_center_threshold_norm: 0.15
  target_effective_motifs: 8
