inherits:
  - ../base.yaml

experiment:
  name: d8m_motif_discovery_stage1_k16

paths:
  resolved_output_root: outputs/d8m_motif_discovery_stage1_k16

output:
  dir: outputs/d8m_motif_discovery_stage1_k16

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      resolved_output_root: outputs/d8m_motif_discovery_stage1_k16
  kaggle:
    paths:
      csv_root: auto
      artifact_root: /kaggle/working/artifacts
      graph_repo_path: /kaggle/input/datasets/irthn1311/graph-repo/graph_repo
      output_root: /kaggle/working/outputs
      resolved_output_root: /kaggle/working/outputs/d8m_motif_discovery_stage1_k16

model:
  name: motif_discovery_debug
  node_dim: 7
  edge_dim: 5
  hidden_dim: 64
  num_motifs: 16
  image_size: 48
  num_nodes: 2304
  pixel_gnn_layers: 1
  dropout: 0.1
  use_pixel_encoder_from: d7
  freeze_pixel_encoder: true
  border_width: 4
  map_sim_threshold: 0.80
  emb_sim_threshold: 0.80
  center_distance_threshold: 0.15
  min_effective_area: 40
  max_effective_area: 400
  max_border_mass: 0.45

data:
  graph_repo_path: null
  batch_size: 32
  num_workers: 2
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  chunk_cache_size: 8
  chunk_aware_shuffle: false

training:
  device: auto
  seed: 42
  epochs: 50
  lr_motif: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  log_every: 20
  val_every: 1
  save_every: 10
  amp: true

motif_loss:
  lambda_div_map: 0.05
  lambda_div_emb: 0.02
  lambda_coverage: 0.05
  lambda_border: 0.02
  lambda_entropy: 0.02
  lambda_area: 0.02
  min_effective_area: 40
  max_effective_area: 400
  border_width: 4

audit:
  redundant_map_threshold: 0.80
  redundant_emb_threshold: 0.80
  redundant_center_threshold_norm: 0.15
  target_effective_motifs: 8
