  num_workers: 0
  persistent_workers: false
  prefetch_factor: null

training:
  epochs: 10

output:
  dir: outputs/stage2a_ablate_hlite_transformer_m6_region

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      resolved_output_root: outputs/stage2a_ablate_hlite_transformer_m6_region
