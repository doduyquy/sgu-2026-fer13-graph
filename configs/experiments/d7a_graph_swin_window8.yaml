inherits:
  - d7a_graph_swin_standalone.yaml

experiment:
  name: d7a_graph_swin_window8

paths:
  resolved_output_root: output/d7a_graph_swin_window8

environments:
  local:
    paths:
      resolved_output_root: output/d7a_graph_swin_window8
  kaggle:
    paths:
      resolved_output_root: /kaggle/working/outputs/d7a_graph_swin_window8

model:
  graph_swin:
    window_size: 8
    shift_size: 4
    window_heads: 4
    use_window_mha: false
    region_merge: true
    num_region_tokens: 9

