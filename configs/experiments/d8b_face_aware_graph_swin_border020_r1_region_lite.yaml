inherits:
  - d8b_face_aware_graph_swin_border020.yaml

experiment:
  name: d8b_face_aware_graph_swin_border020_r1_region_lite

paths:
  resolved_output_root: outputs/d8b_face_aware_graph_swin_border020_r1_region_lite

output:
  dir: outputs/d8b_face_aware_graph_swin_border020_r1_region_lite

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      resolved_output_root: outputs/d8b_face_aware_graph_swin_border020_r1_region_lite
  kaggle:
    paths:
      resolved_output_root: /kaggle/working/outputs/d8b_face_aware_graph_swin_border020_r1_region_lite

attention_regularization:
  enabled: true
  map_name: pixel_gate
  use_upper_floor: true
  target_upper: 0.38
  hard_class_indices: [0, 2, 4, 5]
  lambda_upper: 0.005
  region_tau: 0.05
  start_epoch: 3
  ramp_epochs: 5
  decay_enabled: true
  decay_start_epoch: 25
  decay_end_epoch: 40
  min_lambda_after_decay: 0.0
