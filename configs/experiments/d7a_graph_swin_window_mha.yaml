inherits:
  - d7a_graph_swin_standalone.yaml

experiment:
  name: d7a_graph_swin_window_mha

paths:
  resolved_output_root: output/d7a_graph_swin_window_mha

environments:
  local:
    paths:
      resolved_output_root: output/d7a_graph_swin_window_mha
  kaggle:
    paths:
      resolved_output_root: /kaggle/working/outputs/d7a_graph_swin_window_mha

model:
  graph_swin:
    window_size: 6
    shift_size: 3
    window_heads: 4
    use_window_mha: true
    region_merge: true
    num_region_tokens: 16

