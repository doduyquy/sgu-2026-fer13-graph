inherits:
  - d7a_graph_swin_region_transformer.yaml

experiment:
  name: d8b_face_aware_graph_swin

paths:
  resolved_output_root: output/d8b_face_aware_graph_swin

output:
  dir: output/d8b_face_aware_graph_swin

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      resolved_output_root: output/d8b_face_aware_graph_swin
  kaggle:
    paths:
      csv_root: auto
      artifact_root: /kaggle/working/artifacts
      graph_repo_path: /kaggle/working/artifacts/graph_repo
      output_root: /kaggle/working/outputs
      resolved_output_root: /kaggle/working/outputs/d8b_face_aware_graph_swin

model:
  name: face_aware_graph_swin_d8b
  mode: swin_only
  node_dim: 7
  edge_dim: 5
  hidden_dim: 64
  num_classes: 7
  graph_swin:
    window_size: 6
    shift_size: 3
    window_heads: 4
    use_window_mha: false
    region_merge: true
    num_region_tokens: 16
    use_region_transformer: true
    region_layers: 1
    region_heads: 4
    class_head_type: attn_only
  face_gate:
    enabled: true
    use_pixel_gate: true
    use_window_gate: true
    use_region_gate: true
    pixel_gate_hidden: 32
    window_gate_hidden: 32
    region_gate_hidden: 32
    pixel_gate_use_xy: true
    pixel_gate_use_low_level: true
    window_gate_residual: true
    region_gate_residual: true
    beta_window: 0.5
    beta_region: 0.5
    beta_window_learnable: false
    beta_region_learnable: false

loss:
  name: d8b_face_aware_loss
  use_class_weights: true
  class_counts: [3995, 436, 4097, 7215, 4830, 3171, 4965]
  class_weight_power: 0.25
  ce_weight: 1.0
  pixel_gate_area_weight: 0.01
  pixel_gate_area_target: 0.55
  pixel_gate_border_weight: 0.01
  pixel_gate_border_width: 3
  pixel_gate_smooth_weight: 0.001

training:
  epochs: 120
  early_stopping_patience: 25
  monitor: val_macro_f1
  amp: true
  amp_init_scale: 1024
  grad_clip_norm: 3.0

optimizer:
  name: adamw
  lr: 0.0005
  weight_decay: 0.0001

scheduler:
  name: ReduceLROnPlateau
  mode: max
  monitor: val_macro_f1
  factor: 0.5
  patience: 7
  min_lr: 0.000001
