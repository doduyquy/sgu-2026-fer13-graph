inherits:
  - d7a_graph_swin_standalone.yaml

experiment:
  name: d7a_graph_swin_window4

paths:
  resolved_output_root: output/d7a_graph_swin_window4

environments:
  local:
    paths:
      resolved_output_root: output/d7a_graph_swin_window4
  kaggle:
    paths:
      resolved_output_root: /kaggle/working/outputs/d7a_graph_swin_window4

model:
  graph_swin:
    window_size: 4
    shift_size: 2
    window_heads: 4
    use_window_mha: false
    region_merge: true
    num_region_tokens: 36

