inherits:
  - d7a_graph_swin_region_transformer.yaml

experiment:
  name: d7a_graph_swin_region_transformer_finetune_best

paths:
  resolved_output_root: output/d7a_graph_swin_region_transformer_finetune_best

output:
  dir: output/d7a_graph_swin_region_transformer_finetune_best

environments:
  local:
    paths:
      resolved_output_root: output/d7a_graph_swin_region_transformer_finetune_best
  kaggle:
    paths:
      resolved_output_root: /kaggle/working/outputs/d7a_graph_swin_region_transformer_finetune_best

training:
  epochs: 60
  early_stopping_patience: 15
  monitor: val_macro_f1
  amp: true
  amp_init_scale: 1024
  grad_clip_norm: 3.0

optimizer:
  name: adamw
  lr: 0.00005
  weight_decay: 0.0001

scheduler:
  name: ReduceLROnPlateau
  mode: max
  monitor: val_macro_f1
  factor: 0.5
  patience: 5
  min_lr: 0.000001

init_checkpoint:
  path: /kaggle/input/datasets/irthn1311/d7a-graph-swin-region-transformer-checkpoint/checkpoints/best.pth
  strict: true
  load_optimizer: false
  load_scheduler: false

