output:
  dir: outputs/d8m_stage2c_frozen_hlite_supcon_b_plain

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      resolved_output_root: outputs/d8m_stage2c_frozen_hlite_supcon_b_plain
