inherits:
  - d6b_class_part_graph_motif.yaml

experiment:
  name: d6b_class_part_graph_motif_long100

paths:
  resolved_output_root: output/d6b_class_part_graph_motif_long100

environments:
  local:
    paths:
      resolved_output_root: output/d6b_class_part_graph_motif_long100
  kaggle:
    paths:
      resolved_output_root: /kaggle/working/outputs/d6b_class_part_graph_motif_long100

model:
  num_part_slots: 16
  hidden_dim: 64
  pixel_gnn_layers: 1
  part_layers: 1
  part_heads: 4
  use_class_part_attention: true

loss:
  lambda_slot_div: 0.01
  lambda_border: 0.005
  lambda_slot_balance: 0.01
  lambda_slot_smooth: 0.0

optimizer:
  lr: 0.0005

scheduler:
  name: ReduceLROnPlateau
  mode: max
  monitor: val_macro_f1
  factor: 0.5
  patience: 7
  min_lr: 0.000001

training:
  epochs: 100
  early_stopping_patience: 20
  amp_init_scale: 1024
  grad_clip_norm: 3.0
