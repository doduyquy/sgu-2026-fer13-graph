inherits:
  - d8m_stage2c_frozen_hlite_supcon.yaml

experiment:
  name: d8m_stage2c_frozen_hlite_supcon_b_ceweights

paths:
  graph_repo_path: artifacts/graph_repo
  resolved_output_root: outputs/d8m_stage2c_frozen_hlite_supcon_b_ceweights

model:
  classifier_input: hidden
  projection_normalize: true

training:
  class_weights: true
  weighted_sampler: false
  use_weighted_sampler: false
  lambda_supcon: 0.1
  supcon_start_epoch: 3
  supcon_ramp_epochs: 4

audit:
  dir: outputs/d8m_stage2c_frozen_hlite_supcon_b_ceweights/projection_audit

output:
  dir: outputs/d8m_stage2c_frozen_hlite_supcon_b_ceweights

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      resolved_output_root: outputs/d8m_stage2c_frozen_hlite_supcon_b_ceweights
