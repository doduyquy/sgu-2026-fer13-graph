inherits:
  - ../base.yaml

experiment:
  name: d8m_motif_discovery_stage1e_k16_multiselect_balanced

paths:
  resolved_output_root: outputs/d8m_motif_discovery_stage1e_k16_multiselect_balanced

output:
  dir: outputs/d8m_motif_discovery_stage1e_k16_multiselect_balanced

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      resolved_output_root: outputs/d8m_motif_discovery_stage1e_k16_multiselect_balanced

model:
  name: motif_discovery_debug
  node_dim: 7
  edge_dim: 5
  hidden_dim: 64
  num_motifs: 16
  image_size: 48
  num_nodes: 2304
  pixel_gnn_layers: 1
  dropout: 0.1
  freeze_pixel_encoder: true

  attention_temperature: 0.5
  use_learnable_logit_scale: false
  init_logit_scale: 1.0
  max_logit_scale: 10.0

  use_spatial_query_bias: true
  spatial_bias_type: gaussian
  spatial_bias_sigma: 0.25
  spatial_bias_strength: 1.0
  spatial_bias_decay: true
  spatial_bias_decay_epochs: 20
  spatial_bias_min_strength: 0.1
  spatial_grid_min: 0.18
  spatial_grid_max: 0.82

  use_aux_motif_classifier: true
  aux_pooling: selected_topm_mean
  selection_temperature: 1.5
  selection_top_m: 6
  use_soft_top_m_mask: true
  aux_dropout: 0.2
  num_classes: 7

  border_width: 4
  map_sim_threshold: 0.80
  emb_sim_threshold: 0.80
  center_distance_threshold: 0.15
  min_effective_area: 40
  max_effective_area: 512
  max_border_mass: 0.45

data:
  graph_repo_path: null
  batch_size: 32
  num_workers: 2
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  chunk_cache_size: 8
  chunk_aware_shuffle: false

training:
  device: auto
  seed: 42
  epochs: 50
  lr_motif: 0.001
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  log_every: 20
  val_every: 1
  save_every: 10
  amp: true

motif_loss:
  lambda_div_map: 0.08
  lambda_div_emb: 0.03
  lambda_coverage: 0.04
  lambda_anchor: 0.00
  lambda_border: 0.02
  lambda_soft_border: 0.04
  lambda_outer_border: 0.04
  lambda_entropy: 0.15
  lambda_area: 0.05

  lambda_selected_border: 0.14
  lambda_selected_outer_border: 0.14
  lambda_selected_foreground: 0.10
  lambda_selected_diversity: 0.06
  lambda_selection_entropy: 0.06
  target_selection_entropy_min: 0.9

  min_effective_area: 40
  max_effective_area: 400
  border_width: 4
  outer_border_width: 6

  use_soft_border_penalty: true
  soft_border_tau: 0.12
  use_outer_border_penalty: true

  use_center_weighted_foreground: true
  center_prior_sigma: 0.45
  center_prior_power: 0.3
  coverage_loss_type: cosine

aux_supervision:
  enabled: true
  start_epoch: 6
  ramp_epochs: 5
  lambda_aux_ce: 0.05
  use_class_weights: true
  max_class_weight: 3.0
  class_counts: [3995, 436, 4097, 7215, 4830, 3171, 4965]

schedule:
  enabled: true
  warmup_epochs: 5
  diversity_ramp_epochs: 10
  coverage_start_epoch: 3
  coverage_ramp_epochs: 10
  coverage_boost_epoch: 8
  coverage_boost_factor: 1.2
  soft_border_start_epoch: 1
  soft_border_ramp_epochs: 5
  outer_border_start_epoch: 1
  outer_border_ramp_epochs: 5
  selected_loss_start_epoch: 1
  selected_loss_ramp_epochs: 5
  selection_entropy_start_epoch: 1
  selection_entropy_ramp_epochs: 5

audit:
  redundant_map_threshold: 0.80
  redundant_emb_threshold: 0.80
  redundant_center_threshold_norm: 0.15
  target_effective_motifs: 8
  min_effective_area: 40
  max_effective_area: 512

quality_score:
  area_in_range_weight: 1.2
  coverage_weight: 0.8
  effective_motif_weight: 0.6
  aux_macro_f1_weight: 0.4
  selected_foreground_weight: 1.0
  selection_entropy_weight: 0.7
  selection_entropy_target: 0.9
  selected_border_penalty_weight: 1.4
  selected_outer_border_penalty_weight: 1.4
  border_dominance_penalty_weight: 1.0
  redundant_penalty_weight: 1.0
  map_sim_penalty_weight: 0.4
  area_over_penalty_weight: 0.4
  area_under_penalty_weight: 0.4
