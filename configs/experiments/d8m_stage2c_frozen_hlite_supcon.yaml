experiment:
  name: d8m_stage2c_frozen_hlite_supcon

paths:
  graph_repo_path: artifacts/graph_repo
  resolved_output_root: outputs/d8m_stage2c_frozen_hlite_supcon

stage1:
  config: configs/experiments/d8m_motif_discovery_stage1h_k16_teacher_align_lite_decay_long24.yaml
  checkpoint: outputs/d8m_motif_discovery_stage1h_k16_teacher_align_lite_decay_long24/checkpoints/best.pth
  freeze: true

stage2:
  num_selected_motifs: 6
  selection_source: selection_weights
  graph_type: fully_connected
  self_loops: false
  use_spatial_features: true
  use_area_feature: true
  use_selection_weight_feature: true
  use_region_features: false

model:
  name: motif_semantic_projector
  input_dim: null
  hidden_dim: 256
  projection_dim: 128
  dropout: 0.2
  num_classes: 7
  classifier_input: z

data:
  graph_repo_path: null
  batch_size: 16
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  chunk_cache_size: 8

training:
  device: auto
  seed: 42
  epochs: 10
  lr: 0.001
  weight_decay: 0.0001
  class_weights: true
  class_counts: [3995, 436, 4097, 7215, 4830, 3171, 4965]
  max_class_weight: 3.0
  weighted_sampler: true
  lambda_supcon: 0.2
  supcon_temperature: 0.1
  grad_clip_norm: 1.0
  amp: true
  early_stopping_patience: 15
  save_best_metric: val_macro_f1

audit:
  dir: outputs/d8m_stage2c_frozen_hlite_supcon/projection_audit

output:
  dir: outputs/d8m_stage2c_frozen_hlite_supcon

environments:
  local:
    paths:
      graph_repo_path: artifacts/graph_repo
      resolved_output_root: outputs/d8m_stage2c_frozen_hlite_supcon
