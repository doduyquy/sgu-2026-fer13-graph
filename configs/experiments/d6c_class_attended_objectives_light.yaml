inherits:
  - d6b_class_part_graph_motif_border075.yaml

environment: local

experiment:
  name: d6c_class_attended_objectives_light

run:
  mode: train
  zip_outputs: true

paths:
  resolved_output_root: output/d6c_class_attended_objectives_light

environments:
  local:
    paths:
      resolved_output_root: output/d6c_class_attended_objectives_light
  kaggle:
    paths:
      resolved_output_root: /kaggle/working/outputs/d6c_class_attended_objectives_light

data:
  batch_size: 32
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  chunk_cache_size: 8
  chunk_aware_shuffle: true

model:
  name: slot_pixel_part_graph_motif_d6b
  num_classes: 7
  node_dim: 7
  edge_dim: 5
  hidden_dim: 64
  pixel_gnn_layers: 1
  num_part_slots: 16
  part_layers: 1
  part_heads: 4
  dropout: 0.2
  use_part_position: true
  assignment_temperature: 1.0
  return_attention: true
  use_class_part_attention: true

loss:
  name: d6c_class_attended_motif
  use_class_weights: true
  class_counts: [3995, 436, 4097, 7215, 4830, 3171, 4965]
  class_weight_power: 0.25

  lambda_cls: 1.0
  lambda_slot_div: 0.01
  lambda_border: 0.0075
  lambda_slot_balance: 0.01
  lambda_slot_smooth: 0.0

  lambda_class_border: 0.0025
  lambda_class_attn_sep: 0.005
  lambda_supcon: 0.03

  border_width: 3
  border_loss_type: slot_ratio
  slot_balance_type: kl_uniform
  class_attn_sep_margin: 0.90
  supcon_temperature: 0.2
  confusion_pairs: [[2, 4], [2, 6], [2, 5], [4, 6], [0, 1]]

optimizer:
  name: adamw
  lr: 0.0005
  weight_decay: 0.0001

scheduler:
  name: ReduceLROnPlateau
  mode: max
  monitor: val_macro_f1
  factor: 0.5
  patience: 7
  min_lr: 0.000001

training:
  device: auto
  epochs: 120
  monitor: val_macro_f1
  early_stopping_patience: 25
  grad_clip_norm: 3.0
  amp: true
  amp_init_scale: 1024
  profile_batches: 0
  max_train_batches: null
  max_val_batches: null
  max_test_batches: null
