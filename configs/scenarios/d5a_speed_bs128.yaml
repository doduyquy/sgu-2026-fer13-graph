# Scenario: bs=128, no AMP, no extra workers
# max_train_batches=30 ensures we run at least 30 batches,
# clearly distinguishing from bs64 (which uses 50).
# profile_batches=10 so we get a proper 10-batch average.
data:
  batch_size: 128
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: null
  graph_cache_chunks: 1

training:
  amp: false
  profile_batches: 10
  max_train_batches: 30
  max_val_batches: 5
  max_test_batches: 5
